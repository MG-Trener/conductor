<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>CONDUCTOR | Цветные дымы и Holi</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- particles.js -->
  <script src="https://cdn.jsdelivr.net/npm/particles.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: black;
      color: white;
      text-align: center;
    }

    .hero {
      height: 100vh;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    /* 🔥 Контейнер анимации */
    #particles-js {
      position: absolute;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    /* 🌑 Затемнение */
    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 1;
    }

    .hero * {
      position: relative;
      z-index: 2;
    }

    h1 {
      font-size: 60px;
      margin: 0;
      letter-spacing: 2px;
    }

    p {
      font-size: 22px;
      opacity: 0.9;
      margin-top: 10px;
    }

    .btn {
      margin-top: 15px;
      padding: 15px 30px;
      font-size: 18px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: bold;
      transition: 0.3s;
      display: inline-block;
    }

    .btn-wa {
      background: #25D366;
      color: black;
    }

    .btn-inst {
      background: linear-gradient(45deg, #f58529, #dd2a7b, #8134af);
      color: white;
    }

    .btn:hover {
      transform: scale(1.05);
    }

    .features {
      padding: 60px 20px;
      background: #0a0a0a;
    }

    .grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
    }

    .card {
      background: #111;
      padding: 20px;
      border-radius: 10px;
      width: 250px;
    }

    footer {
      padding: 20px;
      font-size: 14px;
      opacity: 0.5;
    }
  </style>
</head>

<body>

  <section class="hero">

    <!-- 🔥 Анимация -->
    <div id="particles-js"></div>

    <h1>CONDUCTOR</h1>
    <p>Цветные дымы • Краски Holi • Шоу</p>

    <a href="https://instagram.com/conductor.kz" target="_blank" class="btn btn-inst">
      Instagram
    </a>

    <a href="https://wa.me/77018709384" target="_blank" class="btn btn-wa">
      💬 WhatsApp 1
    </a>

    <a href="https://wa.me/77756511100" target="_blank" class="btn btn-wa">
      💬 WhatsApp 2
    </a>

  </section>

  <section class="features">
    <h2>Наши услуги</h2>

    <div class="grid">
      <div class="card">🌈 Краски Holi</div>
      <div class="card">💨 Цветные дымы</div>
      <div class="card">🎆 Салюты</div>
      <div class="card">🔥 Шоу</div>
      <div class="card">🎇 Фейерверки</div>
      <div class="card">💥 Сценарии</div>
    </div>
  </section>

  <footer>
    © Conductor.kz
  </footer>

  <!-- ⚙️ Настройка частиц -->
  <script>
    particlesJS("particles-js", {
      particles: {
        number: {
          value: 120
        },
        color: {
          value: ["#ff0080", "#ff8c00", "#00ffff", "#00ff87", "#ff00ff"]
        },
        shape: {
          type: "circle"
        },
        opacity: {
          value: 0.6,
          random: true
        },
        size: {
          value: 6,
          random: true
        },
        move: {
          enable: true,
          speed: 2,
          direction: "none",
          random: true,
          out_mode: "out"
        }
      },
      interactivity: {
        events: {
          onhover: {
            enable: true,
            mode: "repulse"
          }
        }
      },
      retina_detect: true
    });
  </script>

</body>
</html>
