<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>CONDUCTOR | Цветные дымы и Holi</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: black;
  color: white;
}

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  position: relative;
  overflow: hidden;
}

/* 💨 ТОПОВЫЙ ДЫМ */
.smoke {
  position: absolute;
  width: 1500px;
  height: 1500px;
  border-radius: 50%;
  filter: blur(120px);
  opacity: 0.6;
  mix-blend-mode: screen;
}

/* разные цвета + разное движение */
.s1 {
  background: radial-gradient(circle, #ff0040, transparent 70%);
  top: -300px;
  left: -300px;
  animation: move1 25s ease-in-out infinite;
}

.s2 {
  background: radial-gradient(circle, #00eaff, transparent 70%);
  bottom: -300px;
  right: -200px;
  animation: move2 30s ease-in-out infinite;
}

.s3 {
  background: radial-gradient(circle, #ff8c00, transparent 70%);
  top: 30%;
  left: 60%;
  animation: move3 28s ease-in-out infinite;
}

.s4 {
  background: radial-gradient(circle, #00ff9d, transparent 70%);
  bottom: 10%;
  left: 10%;
  animation: move4 32s ease-in-out infinite;
}

.s5 {
  background: radial-gradient(circle, #ff00ff, transparent 70%);
  top: 50%;
  left: 30%;
  animation: move5 26s ease-in-out infinite;
}

/* движения разные */
@keyframes move1 {
  0%,100% { transform: translate(0,0) scale(1); }
  50% { transform: translate(300px,200px) scale(1.4); }
}

@keyframes move2 {
  0%,100% { transform: translate(0,0) scale(1); }
  50% { transform: translate(-300px,-150px) scale(1.5); }
}

@keyframes move3 {
  0%,100% { transform: translate(0,0) scale(1); }
  50% { transform: translate(-200px,250px) scale(1.3); }
}

@keyframes move4 {
  0%,100% { transform: translate(0,0) scale(1); }
  50% { transform: translate(250px,-200px) scale(1.4); }
}

@keyframes move5 {
  0%,100% { transform: translate(0,0) scale(1); }
  50% { transform: translate(-150px,-150px) scale(1.2); }
}

/* затемнение */
.hero::after {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.45);
}

/* контент */
.content {
  position: relative;
  z-index: 2;
  max-width: 90%;
}

/* текст */
h1 {
  font-size: 64px;
  margin: 0;
}

p {
  font-size: 22px;
  margin-top: 10px;
  opacity: 0.9;
}

/* кнопки */
.buttons {
  margin-top: 25px;
  display: flex;
  flex-direction: column; /* В КОЛОНКУ */
  gap: 15px;
  align-items: center;
}

.btn {
  padding: 15px 25px;
  font-size: 18px;
  border-radius: 12px;
  text-decoration: none;
  font-weight: bold;
  width: 300px;
  text-align: center;
  transition: 0.3s;
}

.btn:hover {
  transform: scale(1.05);
}

.btn-wa {
  background: #25D366;
  color: black;
}

.btn-inst {
  background: linear-gradient(45deg, #f58529, #dd2a7b, #8134af);
  color: white;
}

/* 📱 адаптив */
@media (max-width: 600px) {
  h1 {
    font-size: 42px;
  }

  p {
    font-size: 18px;
  }

  .btn {
    width: 90%;
    font-size: 16px;
  }
}
</style>
</head>

<body>

<section class="hero">

  <!-- 💨 ДЫМ -->
  <div class="smoke s1"></div>
  <div class="smoke s2"></div>
  <div class="smoke s3"></div>
  <div class="smoke s4"></div>
  <div class="smoke s5"></div>

  <div class="content">
    <h1>CONDUCTOR</h1>
    <p>Цветные дымы • Краски Holi • Шоу</p>

    <div class="buttons">
      <a href="https://instagram.com/conductor.kz" target="_blank" class="btn btn-inst">
        Instagram
      </a>

      <a href="https://wa.me/77018709384" target="_blank" class="btn btn-wa">
        💬 WhatsApp +7 701 870 93 84
      </a>

      <a href="https://wa.me/77756511100" target="_blank" class="btn btn-wa">
        💬 WhatsApp +7 775 651 11 00
      </a>
    </div>
  </div>

</section>

</body>
</html>
