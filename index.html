<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>CONDUCTOR | Цветные дымы и Holi</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: black;
      color: white;
      text-align: center;
      overflow-x: hidden;
    }

    .hero {
      height: 100vh;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    /* 🌑 Затемнение */
    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 2;
    }

    /* 💨 ДЫМ */
    .smoke {
      position: absolute;
      width: 200%;
      height: 200%;
      top: -50%;
      left: -50%;
      filter: blur(120px);
      opacity: 0.6;
      animation: moveSmoke 25s linear infinite;
      mix-blend-mode: screen;
    }

    .smoke1 {
      background: radial-gradient(circle, #ff0080, transparent 60%);
      animation-duration: 30s;
    }

    .smoke2 {
      background: radial-gradient(circle, #00ffff, transparent 60%);
      animation-duration: 40s;
      animation-direction: reverse;
    }

    .smoke3 {
      background: radial-gradient(circle, #ff8c00, transparent 60%);
      animation-duration: 35s;
    }

    .smoke4 {
      background: radial-gradient(circle, #00ff87, transparent 60%);
      animation-duration: 45s;
      animation-direction: reverse;
    }

    @keyframes moveSmoke {
      0% {
        transform: translate(0, 0) scale(1);
      }
      50% {
        transform: translate(200px, -150px) scale(1.3);
      }
      100% {
        transform: translate(-200px, 150px) scale(1);
      }
    }

    .hero * {
      position: relative;
      z-index: 3;
    }

    h1 {
      font-size: 60px;
      margin: 0;
      letter-spacing: 2px;
    }

    p {
      font-size: 22px;
      opacity: 0.9;
      margin-top: 10px;
    }

    .btn {
      margin-top: 15px;
      padding: 15px 30px;
      font-size: 18px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: bold;
      transition: 0.3s;
      display: inline-block;
    }

    .btn-wa {
      background: #25D366;
      color: black;
      min-width: 260px;
    }

    .btn-inst {
      background: linear-gradient(45deg, #f58529, #dd2a7b, #8134af);
      color: white;
    }

    .btn:hover {
      transform: scale(1.05);
    }

    .features {
      padding: 60px 20px;
      background: #0a0a0a;
    }

    .grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
    }

    .card {
      background: #111;
      padding: 20px;
      border-radius: 10px;
      width: 250px;
    }

    footer {
      padding: 20px;
      font-size: 14px;
      opacity: 0.5;
    }
  </style>
</head>

<body>

  <section class="hero">

    <!-- 💨 СЛОИ ДЫМА -->
    <div class="smoke smoke1"></div>
    <div class="smoke smoke2"></div>
    <div class="smoke smoke3"></div>
    <div class="smoke smoke4"></div>

    <h1>CONDUCTOR</h1>
    <p>Цветные дымы • Краски Holi • Шоу</p>

    <a href="https://instagram.com/conductor.kz" target="_blank" class="btn btn-inst">
      Instagram
    </a>

    <a href="https://wa.me/77018709384" target="_blank" class="btn btn-wa">
      💬 WhatsApp +7 701 870 93 84
    </a>

    <a href="https://wa.me/77756511100" target="_blank" class="btn btn-wa">
      💬 WhatsApp +7 775 651 11 00
    </a>

  </section>

  <section class="features">
    <h2>Наши услуги</h2>

    <div class="grid">
      <div class="card">🌈 Краски Holi</div>
      <div class="card">💨 Цветные дымы</div>
      <div class="card">🎆 Салюты</div>
      <div class="card">🔥 Шоу</div>
      <div class="card">🎇 Фейерверки</div>
      <div class="card">💥 Сценарии</div>
    </div>
  </section>

  <footer>
    © Conductor.kz
  </footer>

</body>
</html>
