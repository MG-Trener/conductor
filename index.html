<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>CONDUCTOR | Цветные дымы и Holi</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: black;
  color: white;
}

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  position: relative;
  text-align: center;
  overflow: hidden;
}

/* canvas фон */
canvas {
  position: absolute;
  top: 0;
  left: 0;
}

/* затемнение */
.hero::after {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.4);
}

/* контент */
.content {
  position: relative;
  z-index: 2;
}

h1 {
  font-size: 60px;
  margin: 0;
}

p {
  font-size: 22px;
  margin-top: 10px;
}

/* кнопки */
.buttons {
  margin-top: 25px;
  display: flex;
  flex-direction: column;
  gap: 15px;
  align-items: center;
}

.btn {
  padding: 15px 25px;
  font-size: 18px;
  border-radius: 12px;
  text-decoration: none;
  font-weight: bold;
  width: 300px;
}

.btn-wa {
  background: #25D366;
  color: black;
}

.btn-inst {
  background: linear-gradient(45deg, #f58529, #dd2a7b, #8134af);
  color: white;
}

/* адаптив */
@media (max-width: 600px) {
  h1 { font-size: 42px; }
  .btn { width: 90%; }
}
</style>
</head>

<body>

<section class="hero">

  <canvas id="smoke"></canvas>

  <div class="content">
    <h1>CONDUCTOR</h1>
    <p>Цветные дымы • Краски Holi</p>

    <div class="buttons">
      <a href="https://instagram.com/conductor.kz" target="_blank" class="btn btn-inst">
        Instagram
      </a>

      <a href="https://wa.me/77018709384" target="_blank" class="btn btn-wa">
        💬 WhatsApp +7 701 870 93 84
      </a>

      <a href="https://wa.me/77756511100" target="_blank" class="btn btn-wa">
        💬 WhatsApp +7 775 651 11 00
      </a>
    </div>
  </div>

</section>

<script>
const canvas = document.getElementById("smoke");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for (let i = 0; i < 80; i++) {
  particles.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    r: Math.random() * 100 + 50,
    dx: (Math.random() - 0.5) * 1,
    dy: (Math.random() - 0.5) * 1,
    color: `hsl(${Math.random()*360}, 100%, 60%)`
  });
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  particles.forEach(p => {
    let gradient = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r);
    gradient.addColorStop(0, p.color);
    gradient.addColorStop(1, "transparent");

    ctx.fillStyle = gradient;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fill();

    p.x += p.dx;
    p.y += p.dy;

    if (p.x < 0 || p.x > canvas.width) p.dx *= -1;
    if (p.y < 0 || p.y > canvas.height) p.dy *= -1;
  });

  requestAnimationFrame(draw);
}

draw();

window.addEventListener("resize", () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});
</script>

</body>
</html>
